<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>管理员 - 时刻表详情</title>
	<link rel="stylesheet" href="style/timetable.css">
	<link rel="stylesheet" href="style/timetable-detail.css">
	<script src="src/pages/main.js"></script>
	<script src="/lib/ui/init.mjs" type="module"></script>
	<script src="/src/auth-header.js" type="module"></script>
	<script src="/lib/ui/popup.mjs" type="module"></script>
</head>

<body>
	<hcw-body-header>
		<hcw-button flat fill style="min-width: 5rem;" id="back-btn">
			返回审核面板
		</hcw-button>
		<div class="logo-area">
			<div class="logo-text">
				MLTTC - 时刻表详情
			</div>
		</div>
		<p hidden-on-mobile style="margin-left: auto; color: var(--text-muted)">管理员面板</p>
		<div id="headerAuthArea">
			<hcw-button id="themeToggleBtn" flat icon large aria-label="切换主题">🌙</hcw-button>
			<span style="font-size:0.82rem; color:var(--text-muted);" id="adminEmailDisplay"></span>
		</div>
	</hcw-body-header>

	<hcw-article>
		<div id="detail-loading" class="detail-loading">
			<p>加载中...</p>
		</div>
		<div id="detail-error" class="detail-error hidden">
			<p>无法加载时刻表详情</p>
			<hcw-button id="detail-retry-btn" primary flat style="min-width: 6rem;">重试</hcw-button>
		</div>
		<div id="detail-content" class="detail-content hidden">
			<div class="detail-header">
				<h2 id="detail-title" class="detail-title"></h2>
				<span id="detail-id" class="detail-id"></span>
			</div>
			<div class="detail-card">
				<div class="detail-info-grid">
					<div class="detail-info-item">
						<span class="detail-label">城市</span>
						<span class="detail-value" id="detail-city"></span>
					</div>
					<div class="detail-info-item">
						<span class="detail-label">线路</span>
						<span class="detail-value" id="detail-way"></span>
					</div>
					<div class="detail-info-item">
						<span class="detail-label">起点</span>
						<span class="detail-value" id="detail-start"></span>
					</div>
					<div class="detail-info-item">
						<span class="detail-label">终点</span>
						<span class="detail-value" id="detail-end"></span>
					</div>
					<div class="detail-info-item full-width">
						<span class="detail-label">备注</span>
						<span class="detail-value" id="detail-special"></span>
					</div>
				</div>
			</div>
			<div class="detail-card">
				<h3 class="detail-section-title">主站->副站[外环]</h3>
				<div class="detail-time-grid" id="detail-time1"></div>
			</div>
			<div class="detail-card">
				<h3 class="detail-section-title">副站->主站[内环]</h3>
				<div class="detail-time-grid" id="detail-time2"></div>
			</div>
			<div class="detail-card detail-meta-card">
				<div class="detail-meta-row">
					<span class="detail-meta-label">执行时间</span>
					<span class="detail-meta-value" id="detail-starttime"></span>
				</div>
				<div class="detail-meta-row">
					<span class="detail-meta-label">作者</span>
					<span class="detail-meta-value" id="detail-writer"></span>
				</div>
				<div class="detail-meta-row">
					<span class="detail-meta-label">写入时间</span>
					<span class="detail-meta-value" id="detail-writetime"></span>
				</div>
				<div class="detail-meta-row">
					<span class="detail-meta-label">审核状态</span>
					<span class="detail-meta-value" id="detail-pass-status"></span>
				</div>
				<div class="detail-meta-row">
					<span class="detail-meta-label">审核人</span>
					<span class="detail-meta-value" id="detail-passer"></span>
				</div>
			</div>
			<div class="btn-group detail-actions">
				<hcw-button id="detail-back-btn" flat style="min-width: 8rem;">返回审核面板</hcw-button>
			</div>
		</div>
	</hcw-article>

	<hcw-body-footer></hcw-body-footer>

	<script src="/src/pages/admin-detail.js" type="module"></script>
</body>

</html>

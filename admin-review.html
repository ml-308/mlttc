<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>管理员 - 时刻表审核</title>
    <link rel="stylesheet" href="style/index.css">
    <link rel="stylesheet" href="style/timetable.css">
    <link rel="stylesheet" href="style/timetable-detail.css">
    <script src="lib/ui/init.mjs" type="module"></script>
    <script src="/src/auth-header.js" type="module"></script>
</head>

<body>
    <hcw-body-header>
        <hcw-button flat fill style="min-width: 5rem;" id="backBtn">返回</hcw-button>
        <div class="logo-area">
            <div class="logo-text">MLTTC - 时刻表审核</div>
        </div>
        <p hidden-on-mobile style="margin-left: auto; color: var(--text-muted)">管理员面板</p>
        <div id="headerAuthArea">
            <hcw-button id="themeToggleBtn" flat icon large aria-label="切换主题">🌙</hcw-button>
            <span style="font-size:0.82rem; color:var(--text-muted);" id="adminEmailDisplay"></span>
            <hcw-button id="logoutBtn" flat style="min-width: 4rem; font-size:0.82rem;">退出</hcw-button>
        </div>
    </hcw-body-header>

    <hcw-article>
        <!-- 审核入口按钮 -->
        <div class="menu-bar" id="reviewEntrance">
            <hcw-button id="loadReviewBtn" primary flat style="min-width: 12rem; font-size:1rem;">
                加载时刻表审核
            </hcw-button>
        </div>

        <!-- 审核面板 -->
        <div id="reviewPanel" class="form-panel hidden">

            <!-- 未审核时刻表 -->
            <hcw-card>
                <hcw-card-title style="font-size: 1.1rem; display:flex; align-items:center; justify-content:space-between;">
                    <span>未审核时刻表</span>
                    <span id="unreviewedCount" style="font-size:0.82rem; color:var(--text-muted);">0 条</span>
                </hcw-card-title>
                <div id="unreviewedLoading" style="text-align:center; padding:2rem 0; color:var(--text-muted);">加载中...</div>
                <div id="unreviewedEmpty" class="hidden" style="text-align:center; padding:2rem 0; color:var(--text-muted);">暂无未审核时刻表</div>
                <div id="unreviewedList" class="result-area result-list" style="margin-top:0.5rem;"></div>
                <div id="unreviewedPagination" class="pagination-bar hidden" style="display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px;">
                    <hcw-button id="unreviewedPrevBtn" flat style="min-width:4rem; font-size:0.82rem;">上一页</hcw-button>
                    <span id="unreviewedPageInfo" style="font-size:0.82rem; color:var(--text-muted);">0/0</span>
                    <hcw-button id="unreviewedNextBtn" flat style="min-width:4rem; font-size:0.82rem;">下一页</hcw-button>
                </div>
            </hcw-card>

            <!-- 被驳回时刻表 -->
            <hcw-card>
                <hcw-card-title style="font-size: 1.1rem; display:flex; align-items:center; justify-content:space-between;">
                    <span style="color:var(--danger);">被驳回时刻表</span>
                    <span id="rejectedCount" style="font-size:0.82rem; color:var(--text-muted);">0 条</span>
                </hcw-card-title>
                <div id="rejectedLoading" style="text-align:center; padding:2rem 0; color:var(--text-muted);">加载中...</div>
                <div id="rejectedEmpty" class="hidden" style="text-align:center; padding:2rem 0; color:var(--text-muted);">暂无被驳回时刻表</div>
                <div id="rejectedList" class="result-area result-list" style="margin-top:0.5rem;"></div>
                <div id="rejectedPagination" class="pagination-bar hidden" style="display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px;">
                    <hcw-button id="rejectedPrevBtn" flat style="min-width:4rem; font-size:0.82rem;">上一页</hcw-button>
                    <span id="rejectedPageInfo" style="font-size:0.82rem; color:var(--text-muted);">0/0</span>
                    <hcw-button id="rejectedNextBtn" flat style="min-width:4rem; font-size:0.82rem;">下一页</hcw-button>
                </div>
            </hcw-card>

            <!-- 已审核时刻表 -->
            <hcw-card>
                <hcw-card-title style="font-size: 1.1rem; display:flex; align-items:center; justify-content:space-between;">
                    <span style="color:var(--success);">已审核时刻表</span>
                    <span id="reviewedCount" style="font-size:0.82rem; color:var(--text-muted);">0 条</span>
                </hcw-card-title>
                <div id="reviewedLoading" style="text-align:center; padding:2rem 0; color:var(--text-muted);">加载中...</div>
                <div id="reviewedEmpty" class="hidden" style="text-align:center; padding:2rem 0; color:var(--text-muted);">暂无已审核时刻表</div>
                <div id="reviewedList" class="result-area result-list" style="margin-top:0.5rem;"></div>
                <div id="reviewedPagination" class="pagination-bar hidden" style="display:flex; align-items:center; justify-content:center; gap:8px; margin-top:12px;">
                    <hcw-button id="reviewedPrevBtn" flat style="min-width:4rem; font-size:0.82rem;">上一页</hcw-button>
                    <span id="reviewedPageInfo" style="font-size:0.82rem; color:var(--text-muted);">0/0</span>
                    <hcw-button id="reviewedNextBtn" flat style="min-width:4rem; font-size:0.82rem;">下一页</hcw-button>
                </div>
            </hcw-card>
        </div>
    </hcw-article>

    <hcw-body-footer></hcw-body-footer>

    <script src="/src/pages/admin-review.js" type="module"></script>
</body>

</html>

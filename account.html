<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/index.css">
    <link rel="stylesheet" href="style/timetable.css">
    <script src="main.js"></script>
    <script src="login.js"></script>
    <script src="/src/auth-header.js" type="module"></script>
    <script src="/src/pages/account.js" type="module"></script>
    <script src="lib/ui/init.mjs" type="module"></script>
</head>

<body>
    <hcw-body-header>
        <hcw-button flat fill style="min-width: 5rem;" id="backBtn">
            返回
        </hcw-button>
        <div class="logo-area">
            <div class="logo-text">
                MLTTC - 个人空间
            </div>
        </div>
        <p hidden-on-mobile style="margin-left: auto; color: var(--text-muted)">Beta测试版，功能仍在完善中</p>
        <div id="headerAuthArea">
            <!-- 主题切换按钮 -->
            <hcw-button id="themeToggleBtn" flat icon large aria-label="切换主题">🌙</hcw-button>
            <!-- 动态显示登录按钮或用户信息 -->
            <hcw-button id="globalLoginBtn" primary flat style="min-width: 5rem">登录</hcw-button>
            <div id="globalUserInfo" style="display: none;">
                <span><strong id="globalDisplayName">用户</strong></span>
                <hcw-button id="globalLogoutBtn" tp flat inline style="min-width: 5rem">退出</hcw-button>
            </div>
        </div>
    </hcw-body-header>

    <hcw-article style="max-width: 36rem; margin: 0 auto;">
        <!-- 个人信息卡片 -->
        <hcw-card>
            <hcw-card-title style="font-size: 1.1rem;">
                <span id="profileDisplayName">用户昵称</span>
                <span id="profileAccountType"
                    style="font-size: 0.65rem; background: var(--primary); color: var(--on-primary); padding: 1px 8px; border-radius: var(--radius-full); margin-left: 0.4rem; transition: background 0.2s;">普通用户</span>
            </hcw-card-title>
            <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.25rem;">
                <div style="display: flex; gap: 0.4rem; align-items: baseline;">
                    <span style="font-size: 0.72rem; color: var(--text-muted); min-width: 3.5rem;">邮箱</span>
                    <span id="profileEmail" style="font-size: 0.82rem; color: var(--text-secondary);">—</span>
                </div>
                <div style="display: flex; gap: 0.4rem; align-items: baseline;">
                    <span style="font-size: 0.72rem; color: var(--text-muted); min-width: 3.5rem;">个人简介</span>
                    <span id="profileDesc" style="font-size: 0.82rem; color: var(--text-secondary);">这个人很懒，什么都没写…</span>
                </div>
                <div style="display: flex; gap: 0.4rem; align-items: baseline;">
                    <span style="font-size: 0.72rem; color: var(--text-muted); min-width: 3.5rem;">所在地</span>
                    <span id="profileCity" style="font-size: 0.82rem; color: var(--text-secondary);">—</span>
                </div>
                <div style="display: flex; gap: 0.4rem; align-items: baseline;">
                    <span style="font-size: 0.72rem; color: var(--text-muted); min-width: 3.5rem;">注册时间</span>
                    <span id="profileRegDate" style="font-size: 0.82rem; color: var(--text-secondary);">—</span>
                </div>
            </div>
        </hcw-card>

        <!-- 设置卡片 -->
        <hcw-card style="margin-top: 1rem;">
            <hcw-card-title style="font-size: 1.1rem;">个人设置</hcw-card-title>
            <div style="display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.25rem;">
                <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                    <label for="nameInput" style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 500;">修改昵称（最多6字）</label>
                    <input hcw-input id="nameInput" type="text" placeholder="输入新昵称" style="font-size: 0.85rem; padding: 0.5rem 0.4rem;">
                    <p id="nameMsg" class='LP' style="display: none; font-size: 0.72rem;"></p>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.3rem;">
                    <label for="cityInput" style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 500;">修改城市（最多6字）</label>
                    <input hcw-input id="cityInput" type="text" placeholder="输入所在城市" style="font-size: 0.85rem; padding: 0.5rem 0.4rem;">
                    <p id="cityMsg" class='LP' style="display: none; font-size: 0.72rem;"></p>
                </div>
                <hcw-button id="saveBtn" primary flat style="align-self: flex-end; min-width: 5rem; font-size: 0.82rem;">保存</hcw-button>
            </div>
        </hcw-card>

        <!-- 我的时刻表 -->
        <hcw-card style="margin-top: 1rem;">
            <hcw-card-title style="font-size: 1.1rem; display:flex; align-items:center; justify-content:space-between;">
                <span>我的时刻表</span>
                <hcw-button id="tt-refresh-btn" flat icon style="height:1.8rem;width:1.8rem; font-size:0.9rem;" aria-label="刷新">⟳</hcw-button>
            </hcw-card-title>
            <div id="myTimetableArea">
                <div id="timetable-loading" style="text-align:center; padding: 2rem 0; color: var(--text-muted);">加载中...</div>
                <div id="timetable-empty" class="hidden" style="text-align:center; padding: 2rem 0; color: var(--text-muted);">暂未写入时刻表</div>
                <div id="timetable-error" class="hidden" style="text-align:center; padding: 2rem 0; color: var(--danger);"></div>
                <div id="timetable-list" class="result-area result-list" style="margin-top: 0.5rem;"></div>
                <div id="timetable-pagination" class="hidden" style="display:flex; align-items:center; justify-content:center; gap:0.75rem; margin-top:1rem; padding-top:0.75rem; border-top:1px solid var(--border-light);">
                    <hcw-button id="tt-prev-btn" tp icon style="height:1.8rem;width:1.8rem;">&#9664;</hcw-button>
                    <span id="tt-page-info" style="font-size:0.82rem; color:var(--text-muted); min-width:3rem; text-align:center;">1/1</span>
                    <hcw-button id="tt-next-btn" tp icon style="height:1.8rem;width:1.8rem;">&#9654;</hcw-button>
                </div>
            </div>
        </hcw-card>
    </hcw-article>

    <hcw-body-footer>

    </hcw-body-footer>


</body>

</html>

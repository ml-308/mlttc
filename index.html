<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>智行时刻表 · 指挥中心</title>
    <link rel="stylesheet" href="style/index.css">
    <script src="main.js"></script>
    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
        data-cf-beacon='{"token": "db1de41e202d4b7fbcc030454b8f6a75"}'></script><!-- End Cloudflare Web Analytics -->
</head>

<body>
    <hcw-body-header>
        <div class="logo-area">
            <div class="logo-text">
                TTC - 首页
            </div>
        </div>
        <p hidden-on-mobile style="margin-left: auto; color: var(--text-muted)">Beta测试版，功能仍在完善中</p>
        <div id="headerAuthArea">
            <!-- 动态显示登录按钮或用户信息 -->
            <button id="globalLoginBtn" hcw-button primary flat style="min-width: 5rem" onclick=login_btn()>登录</button>
            <div id="globalUserInfo" style="display: none;">
                <span>欢迎，<strong id="globalDisplayName">用户</strong></span>
                <button id="globalLogoutBtn" hcw-button tp flat inline style="min-width: 5rem" onclick="login_out()">退出</button>
            </div>
        </div>
    </hcw-body-header>

    <!-- 主内容区域：标题+8个大按钮 -->
    <hcw-article>
        <div class="button-grid" id="buttonGridContainer">
            <hcw-card data-action="timetable" data-idx="1" onclick="timetable()">
                <h3 hcw-card-title>时刻表查询</h3>
                <p>添加查询时刻表</p>
                <br>
                <hcw-button primary>立即使用</hcw-button>
            </hcw-card>
            <hcw-card data-action="businformation" data-idx="2" onclick="window.location.href='businformation.html'">
                <h3 hcw-card-title>车辆信息查询</h3>
                <p>添加车辆信息</p>
                <br>
                <hcw-button>立即使用</hcw-button>
            </hcw-card>
            <hcw-card data-action="comming" data-idx="3">
                <h3 hcw-card-title>敬请期待</h3>
                <p>敬请期待</p>
                <br>
                <hcw-button disabled>敬请期待</hcw-button>
            </hcw-card>
            <hcw-card data-action="comming" data-idx="4">
                <h3 hcw-card-title>敬请期待</h3>
                <p>敬请期待</p>
                <br>
                <hcw-button disabled>敬请期待</hcw-button>
            </hcw-card>
            <hcw-card data-action="comming" data-idx="5">
                <h3 hcw-card-title>敬请期待</h3>
                <p>敬请期待</p>
                <br>
                <hcw-button disabled>敬请期待</hcw-button>
            </hcw-card>
            <hcw-card data-action="comming" data-idx="6">
                <h3 hcw-card-title>敬请期待</h3>
                <p>敬请期待</p>
                <br>
                <hcw-button disabled>敬请期待</hcw-button>
            </hcw-card>
            <hcw-card data-action="comming" data-idx="7">
                <h3 hcw-card-title>敬请期待</h3>
                <p>敬请期待</p>
                <br>
                <hcw-button disabled>敬请期待</hcw-button>
            </hcw-card>
            <hcw-card data-action="comming" data-idx="8">
                <h3 hcw-card-title>敬请期待</h3>
                <p>敬请期待</p>
                <br>
                <hcw-button disabled>敬请期待</hcw-button>
            </hcw-card>
        </div>
    </hcw-article>

    <!-- 登录模态框 -->
    <div id="globalLoginModal" class="modal" style="align-items: center; display: none;">
        <div hcw-modal>
            <div hcw-modal-title>
                <h3>登录系统</h3>
                <span hcw-button tp icon id="closeModalBtn" onclick=close_login_modal()>&times;</span>
            </div>
            <div hcw-modal-body>
                <div class="input-group">
                    <label>用户名</label>
                    <input hcw-input primary type="text" id="username" placeholder="请输入用户名" autocomplete="off" required
                        onchange="username_in()">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input hcw-input type="password" id="password" placeholder="请输入密码" required onchange="password_in()">
                </div>
                <div id="ErrorLogin" class="error-msg">
                    <p>用户名或密码错误，请重新输入</p>
                </div>
                <button id="login-btn" type="submit" hcw-button primary large onclick="login_btn2()">登 录</button>
                <button id='RegisterBtn' hcw-button large onclick="register_btn()">
                    注册账户
                </button>
                <p style="color: var(--text-muted)">注册功能将在后续版本开放</p>
            </div>
        </div>
    </div>
</body>

</html>

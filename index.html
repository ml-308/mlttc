<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>智行时刻表 · 指挥中心</title>
	    <link rel="stylesheet" href="style.css">
	    <link rel="stylesheet" href="modal-center.css">
	    <script src="main.js"></script>
    <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "db1de41e202d4b7fbcc030454b8f6a75"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>

<!-- 悬浮头部，始终随页面滑动 -->
<div class="floating-header">
    <div class="logo-area">
        <div class="logo-text">
            TTC
        </div>
    </div>
    <div id="headerAuthArea">
        <!-- 动态显示登录按钮或用户信息 -->
        <button id="globalLoginBtn" class="login-btn-fixed" onclick=login_btn()>🔐 登录账户</button>
        <div id="globalUserInfo" style="display: none;" class="user-info-bar">
            <span>欢迎，<strong id="globalDisplayName">用户</strong></span>
            <button id="globalLogoutBtn" class="logout-small" onclick="login_out()">退出</button>
        </div>
    </div>
</div>

<!-- 主内容区域：标题+8个大按钮 -->
<div class="main-dashboard">
    <div class="page-title-section">
        <h2>时刻表查询</h2>
        <p>Beta测试版，功能仍在完善中</p>
    </div>

    <div class="button-grid" id="buttonGridContainer">
        <div class="giant-card" data-action="timetable" data-idx="1" onclick="timetable()">
            <h3>时刻表查询</h3>
            <p>添加查询时刻表</p>
            <div class="badge-coming active-badge">立即使用</div>
        </div>
        <div class="giant-card" data-action="businformation" data-idx="2" onclick="window.location.href='businformation.html'">
            <h3>车辆信息查询</h3>
            <p>添加车辆信息</p>
            <div class="badge-coming active-badge">立即使用</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="3">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="4">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="5">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="6">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="7">
            <div class="badge-coming">敬请期待</div>
        </div>
        <div class="giant-card" data-action="comming" data-idx="8">
            <div class="badge-coming">敬请期待</div>
        </div>
    </div>
</div>

<!-- 登录模态框 -->
<div id="globalLoginModal" class="modal" style="align-items: center; display: none;">
    <div class="modal-card">
        <div class="modal-header">
            <h3>登录系统</h3>
            <span class="close-modal" id="closeModalBtn" onclick=close_login_modal()>&times;</span>
        </div>
        <div class="modal-body">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" autocomplete="off" required onchange="username_in()">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required onchange="password_in()">
                </div>
                <button id="login-btn" type="submit" class="login-submit" onclick="login_btn2()" >登 录</button>
                <div id="ErrorLogin" class="error-msg">
                    <p>用户名或密码错误，请重新输入</p>
                </div>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <button class="login-submit" id='RegisterBtn'style="background: #ffffff; color: #8b75bd;" onclick="register_btn()">
                        注册账户
                    </button>
                    <p style="font-size: 0.8rem; color: #8aa0af; margin-top: 0.5rem;">注册功能将在后续版本开放</p>
        </div>
    </div>
</div>

</body>
</html>

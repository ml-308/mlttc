<body>
    <hcw-body-header>
        <div class="logo-area">
            <div class="logo-text">
                MLTTC - 首页
            </div>
        </div>
        <p hidden-on-mobile style="margin-left: auto; color: var(--text-muted)">Beta测试版，功能仍在完善中</p>
        <div id="headerAuthArea">
            <!-- 动态显示登录按钮或用户信息 -->
            <hcw-button id="globalLoginBtn" primary flat style="min-width: 5rem" >登录</hcw-button>
            <div id="globalUserInfo" style="display: none;">
                <span>欢迎，<strong id="globalDisplayName">用户</strong></span>
                <hcw-button id="globalLogoutBtn" tp flat inline style="min-width: 5rem"
                    >退出</hcw-button>
            </div>
        </div>
    </hcw-body-header>

    <!-- 主内容区域：标题+8个大按钮 -->
    <hcw-article>
        <hcw-hero>
            <h1>MLTTC</h1>
            <h3>All things you need</h3>
            <p id="time"></p>
            <p>中考加油！</p>
            <p></p>
        </hcw-hero>
        <div class="button-grid" id="buttonGridContainer">
            <hcw-card data-action="timetable" data-idx="1">
                <h3 hcw-card-title>时刻表查询</h3>
                <p>添加查询时刻表</p>
                <br>
                <hcw-button primary href="timetable.html">立即使用</hcw-button>
            </hcw-card>
            <hcw-card data-action="businformation" data-idx="2">
                <h3 hcw-card-title>车辆信息查询</h3>
                <p>添加车辆信息</p>
                <br>
                <hcw-button href="businformation.html">立即使用</hcw-button>
            </hcw-card>
            <hcw-card data-action="comming" data-idx="3">
                <h3 hcw-card-title>敬请期待</h3>
                <p>敬请期待</p>
                <br>
                <hcw-button disabled>敬请期待</hcw-button>
            </hcw-card>
            <hcw-card data-action="comming" data-idx="4">
                <h3 hcw-card-title>敬请期待</h3>
                <p>敬请期待</p>
                <br>
                <hcw-button disabled>敬请期待</hcw-button>
            </hcw-card>

    <hcw-body-footer id="hcw-footer-replace">

    </hcw-body-footer>

    <!-- 登录模态框 -->
    <div id="globalLoginModal" class="modal" style="align-items: center; display: none;">
        <div hcw-modal>
            <div hcw-modal-title>
                <h3>登录系统</h3>
                <hcw-button tp icon id="closeModalBtn" >&times;</hcw-button>
            </div>
            <div hcw-modal-body>
                <hcw-input primary label="用户名" type="text" id="username" placeholder="请输入用户名" autocomplete="off" required></hcw-input>
                <hcw-input label="密码" type="password" id="password" placeholder="请输入密码" required></hcw-input>
                <div id="ErrorLogin" class="error-msg">
                    <p>用户名或密码错误，请重新输入</p>
                </div>
                <hcw-button primary large id="login-btn" type="submit" >登 录</hcw-button>
                <hcw-button id='RegisterBtn' large href="register.html" >
                    注册账户
                </hcw-button>
                <p style="color: var(--text-muted)">注册功能将在后续版本开放</p>
            </div>
        </div>
    </div>

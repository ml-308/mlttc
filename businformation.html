<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>时刻表</title>
	<link rel="stylesheet" href="style/timetable.css">
	<script src="timetable.js"></script>
	<script src="main.js"></script>
	<script src="lib/ui/init.mjs" type="module"></script>
</head>

<body>

	<!-- 悬浮头部，始终随页面滑动 -->
	<hcw-body-header>
		<hcw-button flat fill style="min-width: 5rem;" onclick="back()">
			返回
		</hcw-button>
		<div class="logo-area">
			<div class="logo-text">
				TTC - 线路查询系统
			</div>
		</div>
		<p hidden-on-mobile style="margin-left: auto; color: var(--text-muted)">Beta测试版，功能仍在完善中</p>
		<div id="headerAuthArea">
			<hcw-button id="globalLoginBtn" primary flat style="min-width: 5rem" onclick=login_btn()>登录</hcw-button>
			<div id="globalUserInfo" style="display: none;">
				<span>欢迎，<strong id="globalDisplayName">用户</strong></span>
				<hcw-button id="globalLogoutBtn" tp flat inline style="min-width: 5rem"
					onclick="login_out()">退出</hcw-button>
			</div>
		</div>
	</hcw-body-header>

	<hcw-article>
		<div class="menu-bar">
			<hcw-button id="search-btn" class="menu-btn" primary data-menu="search"
				onclick="searchForm()">查询线路</hcw-button>
			<hcw-button id="add-btn" class="menu-btn" data-menu="add" onclick="addForm()">添加线路</hcw-button>
			<hcw-button id="delete-btn" class="menu-btn" variant="danger" data-menu="delete"
				onclick="deleteForm()">删除线路</hcw-button>

		</div>
		<div class="form-panel">
			<!-- 添加模块 -->
			<form hcw-card id="add-form" class="form-card hidden" action="add.php">
				<div class="grid-2col">
					<div class="form-group">
						<label>城市</label>
						<input hcw-input type="text" id="city" name="city" placeholder="例: 北京市" autocomplete="off"
							required>
					</div>
					<div class="form-group">
						<label>线路</label>
						<input hcw-input type="text" id="way" name="way" placeholder="例: 快速直达专线1路 / 52路" required>
					</div>
					<div class="form-group">
						<label>起点站</label>
						<input hcw-input type="text" id="start" name="start" placeholder="主站名称" required>
					</div>
					<div class="form-group">
						<label>终点站</label>
						<input hcw-input type="text" id="end" name="end" placeholder="副站名称" required>
					</div>
					<div class="form-group full-width">
						<label>备注 <span class="optional">(单日/双日/工作日/节假日等)</span></label>
						<input hcw-input type="text" id="bc" name="bc" placeholder="例如：工作日运行，周末除外，若无则留空">
					</div>
					<div class="form-group">
						<label>主站→副站时刻表</label>
						<input hcw-input type="text" id="time1" name="time1" placeholder="例: 0600 0630 0700" required>
					</div>
					<div class="form-group">
						<label>副站→主站时刻表</label>
						<input hcw-input type="text" id="time2" name="time2" placeholder="例: 0620 0650 0730" required>
					</div>
					<div class="form-group full-width">
						<label>执行时间</label>
						<input hcw-input type="text" id="exec-time" name="exec-time" placeholder="例: 2025.01.01"
							required>
					</div>
				</div>
				<div class="btn-group">
					<button hcw-button primary flat style="min-width: 8rem;" type="button" id="submitAddBtn"
						onclick="add_form()">添加上传</button>
					<button hcw-button style="min-width: 8rem;" type="button" id="resetAddBtn"
						onclick="clear()">清空表单</button>
				</div>
				<div id="add-result" class="result-card hidden"></div>
			</form>

			<!-- 查询模块 -->
			<form hcw-card id="search-form" class="form-card hidden">
				<div class="grid-2col">
					<div class="form-group">
						<label>城市 <span style="color:#e07c4c;">*</span></label>
						<input hcw-input type="text" id="search-city" placeholder="城市名">
					</div>
					<div class="form-group">
						<label>线路 <span style="color:#e07c4c;">*</span></label>
						<input hcw-input type="text" id="search-way" placeholder="例: 52路">
					</div>
					<div class="form-group full-width">
						<label>线路ID (选填)</label>
						<input hcw-input type="text" id="search-id" placeholder="直接输入ID将优先精确查找">
					</div>
				</div>
				<div class="btn-group">
					<button hcw-button type="button" style="min-width: 8rem;" primary id="submitSearchBtn">查询线路</button>
					<button hcw-button type="button" style="min-width: 5rem;" variant="danger" id="clearSearchBtn"
						onclick="clearSearchForm()">清除</button>
				</div>
				<div id="search-result" class="result-card hidden"></div>
			</form>

			<!-- 删除模块 -->
			<form hcw-card id="delete-form" class="form-card hidden">
				<div class="form-group">
					<label>删除记录 (输入线路ID)</label>
					<input hcw-input type="text" id="delete-id" placeholder="例如: T10001" autocomplete="off">
				</div>
				<div class="btn-group">
					<button hcw-button style="min-width: 8rem;" variant="danger" type="button"
						id="submitDeleteBtn">永久删除</button>
				</div>
				<div id="delete-result" class="result-card hidden"></div>
			</form>
		</div>
	</hcw-article>

	<hcw-body-footer id="hcw-footer-replace"></hcw-body-footer>

	<!-- 登录模态框 -->
	<div id="globalLoginModal" class="modal" style="align-items: center; display: none;">
		<div hcw-modal>
			<div hcw-modal-title>
				<h3>登录系统</h3>
				<span hcw-button tp icon id="closeModalBtn" onclick=close_login_modal()>&times;</span>
			</div>
			<div hcw-modal-body>
				<div class="input-group">
					<label>用户名</label>
					<input hcw-input primary type="text" id="username" placeholder="请输入用户名" autocomplete="off" required
						onchange="username_in()">
				</div>
				<div class="input-group">
					<label>密码</label>
					<input hcw-input type="password" id="password" placeholder="请输入密码" required
						onchange="password_in()">
				</div>
				<div id="ErrorLogin" class="error-msg">
					<p>用户名或密码错误，请重新输入</p>
				</div>
				<button hcw-button primary large id="login-btn" type="submit" class="login-submit"
					onclick="login_btn2()">登 录</button>
				<button id='RegisterBtn' hcw-button large onclick="register_btn()">
					注册账户
				</button>
				<p style="color: var(--text-muted)">注册功能将在后续版本开放</p>
			</div>
		</div>
	</div>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>时刻表</title>

</head>
<body>

<!-- 悬浮头部，始终随页面滑动 -->
<div class="floating-header">
    <div class="logo-area">
        <div class="logo-text">
            TTC
        </div>
    </div>
    <div id="headerAuthArea">
        <!-- 动态显示登录按钮或用户信息 -->
        <button id="globalLoginBtn" class="login-btn-fixed" onclick="login_btn()">🔐 登录账户</button>
        <div id="globalUserInfo" style="display: none;" class="user-info-bar">
            <span>欢迎，<strong id="globalDisplayName">用户</strong></span>
            <button id="globalLogoutBtn" class="logout-small" onclick="login_out()">退出</button>
        </div>
    </div>
</div>


<div class="dashboard">
    <div>
		<button class="login-btn-fixed" onclick="back()">
			返回
		</button>
	</div>
    <div class="hero">
        <h1>时刻表查询系统</h1>
        <p>Beta测试版</p>
    </div>
    
    <div class="menu-bar">
		<button id="search-btn" class="menu-btn" data-menu="search" onclick="searchForm()">查询时刻表</button>
        <button id="add-btn" class="menu-btn" data-menu="add" onclick="addForm()">添加时刻表</button>
        <button id="delete-btn" class="menu-btn" data-menu="delete" onclick="deleteForm()">删除时刻表</button>

    </div>
	    <div class="form-panel">
		        <!-- 添加模块 -->
		        <form id="add-form" class="form-card hidden" action="add.php">
	            <div class="grid-2col">
	                <div class="form-group">
	                    <label>城市</label>
	                    <input class="form-control" type="text" id="city" name="city" placeholder="例: 北京市" autocomplete="off" required onchange="citychange()">
                        <p id="citytest" class="lp"></p>
	                </div>
	                <div class="form-group">
	                    <label>线路</label>
	                    <input class="form-control" type="text" id="way" name="way" placeholder="例: 快速直达专线1路 / 52路" required onchange="waychange()">
						<p id="waytest" class="lp"></p>
	                </div>
	                <div class="form-group">
	                    <label>起点站</label>
	                    <input class="form-control" type="text" id="start" name="start" placeholder="主站名称" required onchange="startchange()">
						<p id="starttest" class="lp"></p>
	                </div>
	                <div class="form-group">
	                    <label>终点站</label>
	                    <input class="form-control" type="text" id="end" name="end" placeholder="副站名称" required onchange="endchange()">
						<p id="endtest" class="lp"></p>
					</div>
	                <div class="form-group full-width">
	                    <label>备注 <span class="optional">(单日/双日/工作日/节假日等)</span></label>
	                    <input class="form-control" type="text" id="bc" name="bc" placeholder="例如：工作日运行，周末除外，若无则留空" onchange="bcchange()">
						<p id="bctest" class="lp"></p>
	                </div>
	                <div class="form-group full-width" >
	                    <label>主站→副站时刻表</label>
	                    <textarea class="form-control" type="text" id="time1" name="time1" placeholder="例: 0600 0630 0700" required onchange="time1change()"></textarea>
						<p id="time1test" class="lp"></p>
						<button type="button" class="btn-secondary" id="back1" onclick="backone()" style="display:none;background-color:rgb(78, 174, 92);color:#fff">还原该时刻表</button>
						<button type="button" class="btn-secondary" id="cl1" onclick="clt1()" style="display: none;background-color: #e07c4c;color:#fff;">清空该时刻表</button>
	                </div>
	                <div class="form-group full-width">
	                    <label>副站→主站时刻表</label>
	                    <textarea class="form-control" type="text" id="time2" name="time2" placeholder="例: 0620 0650 0730" required onchange="time2change()"></textarea>
						<p id="time2test" class="lp"></p>
						<button type="button" class="btn-secondary" id="back2" onclick="backtwo()" style="display:none;background-color:rgb(78, 174, 92);color:#fff">还原该时刻表</button>
						<button type="button" class="btn-secondary" id="cl2" onclick="clt2()" style="display: none;background-color: #e07c4c;color:#fff;">清空该时刻表</button>
	                </div>
	                <div class="form-group full-width">
	                    <label>执行时间</label>
	                    <input class="form-control" type="text" id="exec-time" name="exec-time" placeholder="例: 2025.01.01" required onchange="exec_timechange()">
						<p id="exec-timetest" class="lp"></p>
	                </div>
	            </div>
	            <div class="btn-group">
	                <button type="button" class="btn-primary" id="submitAddBtn" onclick="add_form()" style="background-color: #b43636">添加上传</button>
	                <button type="button" class="btn-secondary" id="resetAddBtn" onclick="cleanAddForm()">清空表单</button>
	            </div>
	            <div id="add-result" class="result-card hidden"></div>
	        </form>

		        <!-- 查询模块 -->
		        <form id="search-form" class="form-card hidden">
	            <div class="grid-2col">
	                <div class="form-group">
	                    <label>城市 <span style="color:#e07c4c;">*</span></label>
	                    <input type="text" id="search-city" placeholder="城市名" onchange="search_city()">
						<p id="search-citytest" class="lp"></p>
	                </div>
	                <div class="form-group">
	                    <label>线路 <span style="color:#e07c4c;">*</span></label>
	                    <input type="text" id="search-way" placeholder="例: 52路" onchange="search_way()">
						<p id="search-waytest" class="lp"></p>
	                </div>
	                <div class="form-group full-width">
	                    <label>时刻表ID (选填)</label>
	                    <input type="text" id="search-id" placeholder="直接输入ID将优先精确查找">

	                </div>
	            </div>
	            <div class="btn-group">
		                <button type="button" class="btn-primary" id="submitSearchBtn">查询时刻表</button>
		                <button type="button" class="btn-secondary" id="clearSearchBtn" onclick="clearSearchForm()">清除</button>
	            </div>
	            <div id="search-result" class="result-card hidden"></div>
	        </form>

		        <!-- 删除模块 -->
		        <form id="delete-form" class="form-card hidden">
	            <div class="form-group">
	                <label>删除记录 (输入时刻表ID)</label>
	                <input type="text" id="delete-id" placeholder="例如: T10001" autocomplete="off">
	            </div>
	            <div class="btn-group">
	                <button type="button" class="btn-primary" id="submitDeleteBtn">永久删除</button>
	            </div>
	            <div id="delete-result" class="result-card hidden"></div>
	        </form>
    </div>

</div>
<!-- 登录模态框 -->
<div id="globalLoginModal" class="modal" style="align-items: center; display: none;">
    <div class="modal-card">
        <div class="modal-header">
            <h3>登录系统</h3>
            <span class="close-modal" id="closeModalBtn" onclick=close_login_modal()>&times;</span>
        </div>
        <div class="modal-body">
                <div class="input-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" autocomplete="off" required onchange="username_in()">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required onchange="password_in()">
                </div>
                <button id="login-btn" type="submit" class="login-submit" onclick="login_btn2()" >登 录</button>
                <div id="ErrorLogin" class="error-msg">
                    <p>用户名或密码错误，请重新输入</p>
                </div>
                <div style="text-align: center; margin-top: 1.5rem;">
                    <button class="login-submit" id='RegisterBtn'style="background: #ffffff; color: #8b75bd;" onclick="register_btn()">
                        注册账户 (暂未开放)
                    </button>
                    <p style="font-size: 0.8rem; color: #8aa0af; margin-top: 0.5rem;">注册功能将在后续版本开放</p>
        </div>
    </div>
</div>
</body>
    <link rel="stylesheet" href="timetable.css">
    <script src="timetable.js"></script>
    <script src="main.js"></script>
</html>
